<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Logan's Last Raid</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@400;600;700&family=UnifrakturMaguntia&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #c8943a;
  --gold-lt: #f5d472;
  --gold-dk: #4a3208;
  --blood: #6b0f0f;
  --ember: #e85a00;
  --dim-overlay: rgba(0,0,0,0.72);
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { width:100%; height:100%; overflow:hidden; background:#000; }
body { font-family:'Cinzel', serif; color:var(--gold); touch-action:manipulation; }

/* ── GRAIN ── */
body::after {
  content:''; position:fixed; inset:0; z-index:1000; pointer-events:none;
  opacity:0.045;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
}

/* ══════════════════════════════════
   SELECT SCREEN
══════════════════════════════════ */
#selectScreen {
  position:fixed; inset:0; z-index:10;
  display:flex; flex-direction:column;
  transition:opacity .5s ease;
}
#selectScreen.out { opacity:0; pointer-events:none; }

/* Background */
.select-bg {
  position:absolute; inset:0;
  background:
    radial-gradient(ellipse 80% 40% at 50% 75%, rgba(200,80,0,.2) 0%, transparent 65%),
    radial-gradient(ellipse 120% 80% at 50% 100%, rgba(60,15,0,.5) 0%, transparent 60%),
    linear-gradient(180deg, #020100 0%, #080402 40%, #0c0502 100%);
}
.select-vignette {
  position:absolute; inset:0; pointer-events:none;
  background:radial-gradient(ellipse 95% 95% at 50% 50%, transparent 35%, rgba(0,0,0,.9) 100%);
}

/* Title */
.select-title {
  position:relative; z-index:5;
  text-align:center;
  padding:22px 16px 0;
  pointer-events:none;
}
.select-title h1 {
  font-family:'UnifrakturMaguntia', cursive;
  font-size:clamp(30px, 8.5vw, 52px);
  color:var(--gold-lt);
  text-shadow:0 0 50px rgba(220,140,20,.7), 0 0 100px rgba(180,70,0,.4), 2px 3px 0 rgba(0,0,0,.9);
  line-height:1;
}
.select-title p {
  font-family:'IM Fell English', serif;
  font-style:italic;
  color:rgba(160,100,30,.7);
  font-size:11px;
  letter-spacing:4px;
  margin-top:5px;
}
.title-rule {
  display:flex; align-items:center; gap:8px;
  max-width:260px; margin:8px auto 0;
}
.title-rule-line { flex:1; height:1px; background:linear-gradient(90deg,transparent,var(--gold-dk),transparent); }
.title-rule-gem { width:5px; height:5px; background:var(--gold); transform:rotate(45deg); flex-shrink:0; }

/* Campfire */
.campfire-wrap {
  position:absolute;
  bottom:15%; left:50%; transform:translateX(-50%);
  z-index:6; width:70px;
  display:flex; flex-direction:column; align-items:center;
}
.fire-glow-ground {
  position:absolute; bottom:-20px; left:50%; transform:translateX(-50%);
  width:160px; height:80px;
  background:radial-gradient(ellipse at 50% 100%, rgba(255,100,0,.35), rgba(180,50,0,.15) 50%, transparent 75%);
  filter:blur(12px);
  animation:glow-pulse .3s ease-in-out infinite alternate;
}
@keyframes glow-pulse { from{opacity:.6;transform:translateX(-50%) scaleX(.88)} to{opacity:1;transform:translateX(-50%) scaleX(1.12)} }
.fire-logs-img {
  position:relative; width:60px; height:14px; z-index:2;
}
.fire-logs-img::before, .fire-logs-img::after {
  content:''; position:absolute;
  width:50px; height:7px;
  background:linear-gradient(90deg,#120600,#2a1004,#120600);
  border-radius:4px; box-shadow:0 1px 8px rgba(255,80,0,.5);
  top:3px; left:5px;
}
.fire-logs-img::after { transform:rotate(52deg); transform-origin:center; }
.fire-coals {
  position:absolute; bottom:4px; left:50%; transform:translateX(-50%);
  width:40px; height:7px;
  background:radial-gradient(ellipse, rgba(255,120,0,.9), rgba(180,40,0,.5), transparent);
  border-radius:50%; animation:coals .35s ease-in-out infinite alternate;
}
@keyframes coals { from{opacity:.65} to{opacity:1} }
.flames-svg { position:absolute; bottom:12px; left:50%; transform:translateX(-50%); overflow:visible; }
.f-out { animation:fout .22s ease-in-out infinite alternate; transform-origin:50% 100%; }
.f-mid { animation:fmid .17s ease-in-out infinite alternate; transform-origin:50% 100%; }
.f-in  { animation:fin  .13s ease-in-out infinite alternate; transform-origin:50% 100%; }
@keyframes fout { 0%{transform:scaleX(.87) scaleY(.92) rotate(-2deg)} 100%{transform:scaleX(1.1) scaleY(1.06) rotate(2deg)} }
@keyframes fmid { 0%{transform:scaleX(1.04) scaleY(.96) rotate(3deg)} 100%{transform:scaleX(.91) scaleY(1.05) rotate(-2deg)} }
@keyframes fin  { 0%{transform:scaleX(.92) scaleY(1.05)} 100%{transform:scaleX(1.07) scaleY(.94)} }

/* Characters Row */
.chars-arc {
  position:absolute;
  bottom:0; left:0; right:0;
  height:78%;
  z-index:7;
  display:flex;
  align-items:flex-end;
  justify-content:center;
}

.char-slot {
  position:relative;
  flex:1;
  max-width:calc(100vw / 7);
  height:100%;
  cursor:pointer;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:flex-end;
  padding-bottom:4%;
  transform-origin:bottom center;
  transition:transform .4s cubic-bezier(.23,1,.32,1), filter .4s ease, opacity .4s ease;
  -webkit-user-select:none; user-select:none;
}
.char-slot.dimmed {
  opacity:.15;
  filter:grayscale(.8) brightness(.35);
  pointer-events:none;
}
.char-slot.selected {
  transform:scaleX(1) scaleY(1);
}

/* Portrait card */
.char-portrait {
  position:relative;
  width:100%;
  height:85%;
  overflow:hidden;
}
/* Idle image */
.portrait-idle {
  position:absolute; inset:0;
  background-size:cover;
  background-position:top center;
  background-repeat:no-repeat;
  transition:opacity .4s ease;
  /* Desaturate slightly at rest */
  filter:saturate(.75) brightness(.8);
}
/* Firelight overlay — warm from below */
.portrait-fire-overlay {
  position:absolute; inset:0;
  background:
    linear-gradient(0deg,
      rgba(180,70,0,.55) 0%,
      rgba(120,40,0,.25) 25%,
      transparent 55%),
    linear-gradient(180deg,
      rgba(0,0,0,.6) 0%,
      transparent 30%,
      transparent 60%,
      rgba(0,0,0,.3) 100%);
  pointer-events:none;
}
/* Edge darkening so chars blend into bg */
.portrait-edge {
  position:absolute; inset:0;
  box-shadow:inset 8px 0 16px rgba(0,0,0,.7), inset -8px 0 16px rgba(0,0,0,.7);
  pointer-events:none;
}
/* Bottom fade into ground */
.portrait-bottom-fade {
  position:absolute; bottom:0; left:0; right:0; height:40%;
  background:linear-gradient(0deg, rgba(5,2,0,1) 0%, rgba(5,2,0,.7) 40%, transparent 100%);
  pointer-events:none;
}
/* Hover / active brightening */
.char-slot:active .portrait-idle,
.char-slot.hovered .portrait-idle {
  filter:saturate(1.1) brightness(1.05);
}
.char-slot:active .portrait-fire-overlay,
.char-slot.hovered .portrait-fire-overlay {
  background:
    linear-gradient(0deg,
      rgba(220,100,0,.65) 0%,
      rgba(160,60,0,.3) 25%,
      transparent 55%),
    linear-gradient(180deg,
      rgba(0,0,0,.4) 0%,
      transparent 30%);
}

/* Name tag */
.char-name-tag {
  font-size:clamp(7px, 1.8vw, 11px);
  letter-spacing:2px;
  color:rgba(180,110,30,.8);
  text-transform:uppercase;
  text-align:center;
  margin-top:4px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  max-width:100%;
  padding:0 2px;
  transition:color .2s;
}
.char-slot:active .char-name-tag { color:var(--gold-lt); }

/* Tap hint */
.tap-hint {
  position:absolute; bottom:2%; left:0; right:0;
  text-align:center; z-index:8;
  font-family:'IM Fell English', serif;
  font-style:italic;
  color:rgba(160,100,30,.55);
  font-size:11px; letter-spacing:3px;
  animation:hint-pulse 3s ease-in-out infinite;
  pointer-events:none;
  transition:opacity .4s;
}
@keyframes hint-pulse { 0%,100%{opacity:.3} 50%{opacity:.85} }

/* Canvas */
#emberCanvas { position:fixed; inset:0; z-index:2; pointer-events:none; }

/* ══════════════════════════════════
   DETAIL PANEL (slides up on select)
══════════════════════════════════ */
#detailPanel {
  position:fixed; inset:0; z-index:50;
  display:flex; flex-direction:column;
  pointer-events:none;
  opacity:0;
  transition:opacity .35s ease;
}
#detailPanel.open {
  opacity:1; pointer-events:all;
}

/* Blurred dark backdrop */
.detail-backdrop {
  position:absolute; inset:0;
  background:rgba(0,0,0,.82);
  backdrop-filter:blur(3px);
  -webkit-backdrop-filter:blur(3px);
}

/* Big character image — top 55% of screen */
.detail-hero {
  position:absolute;
  top:0; left:0; right:0;
  height:58%;
  overflow:hidden;
}
.detail-hero-img {
  position:absolute; inset:0;
  background-size:cover;
  background-position:top center;
  background-repeat:no-repeat;
  transform:scale(1.08);
  transition:transform .6s cubic-bezier(.23,1,.32,1);
  filter:brightness(.9) contrast(1.05);
}
#detailPanel.open .detail-hero-img { transform:scale(1); }

/* Dramatic lighting over hero */
.detail-hero-overlay {
  position:absolute; inset:0;
  background:
    linear-gradient(0deg,
      rgba(4,2,0,1) 0%,
      rgba(4,2,0,.7) 15%,
      rgba(10,5,0,.2) 40%,
      transparent 70%),
    linear-gradient(180deg,
      rgba(0,0,0,.5) 0%,
      transparent 25%),
    radial-gradient(ellipse 80% 60% at 50% 80%, rgba(200,80,0,.2), transparent 70%);
}

/* Stats card slides up */
.detail-card {
  position:absolute;
  bottom:0; left:0; right:0;
  background:linear-gradient(0deg, rgba(4,2,0,.99) 60%, rgba(4,2,0,.85) 100%);
  border-top:1px solid var(--gold-dk);
  padding:16px 20px 28px;
  transform:translateY(100%);
  transition:transform .45s cubic-bezier(.23,1,.32,1) .1s;
}
#detailPanel.open .detail-card { transform:translateY(0); }

/* Corner ornaments */
.detail-card::before {
  content:''; position:absolute; top:-1px; left:-1px;
  width:16px; height:16px;
  border-top:1px solid var(--gold);
  border-left:1px solid var(--gold);
}
.detail-card::after {
  content:''; position:absolute; top:-1px; right:-1px;
  width:16px; height:16px;
  border-top:1px solid var(--gold);
  border-right:1px solid var(--gold);
}

/* Editable name */
.detail-name-wrap {
  display:flex; align-items:baseline; gap:8px;
  margin-bottom:2px;
}
.detail-name {
  font-family:'UnifrakturMaguntia', cursive;
  font-size:clamp(24px,7vw,36px);
  color:var(--gold-lt);
  text-shadow:0 0 20px rgba(220,140,20,.5);
  outline:none;
  border:none; background:none;
  cursor:text;
  min-width:10px;
  transition:text-shadow .2s;
  caret-color:var(--gold-lt);
}
.detail-name:focus {
  text-shadow:0 0 20px rgba(220,140,20,.8), 0 0 1px rgba(220,140,20,.5);
  border-bottom:1px solid var(--gold-dk);
}
.edit-hint {
  font-family:'IM Fell English', serif;
  font-style:italic;
  font-size:10px;
  color:rgba(150,90,20,.5);
  white-space:nowrap;
}
.detail-class {
  font-size:9px; letter-spacing:3px;
  color:rgba(160,100,30,.75);
  text-transform:uppercase;
  margin-bottom:3px;
}
.detail-tagline {
  font-family:'IM Fell English', serif;
  font-style:italic;
  color:rgba(130,75,15,.85);
  font-size:12px;
  margin-bottom:12px;
}

/* Vitals */
.vitals-row {
  display:flex; gap:0; margin-bottom:12px;
  border:1px solid var(--gold-dk);
}
.vital {
  flex:1; text-align:center;
  padding:7px 4px;
  border-right:1px solid var(--gold-dk);
}
.vital:last-child { border-right:none; }
.vital-val {
  font-family:'Cinzel Decorative', serif;
  font-size:18px; line-height:1; margin-bottom:2px;
}
.vital-lbl { font-size:8px; letter-spacing:2px; color:rgba(150,90,20,.75); text-transform:uppercase; }

/* Stat bars */
.stat-bars { display:flex; flex-direction:column; gap:5px; margin-bottom:14px; }
.sbar { display:flex; align-items:center; gap:7px; }
.sbar-lbl { font-size:9px; letter-spacing:1px; color:rgba(160,100,30,.8); width:26px; flex-shrink:0; text-transform:uppercase; }
.sbar-track {
  flex:1; height:8px;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(200,160,60,.1);
  overflow:hidden;
}
.sbar-fill {
  height:100%;
  background:linear-gradient(90deg, rgba(100,45,5,.9), var(--gold), var(--gold-lt));
  box-shadow:0 0 6px rgba(200,130,20,.45);
  width:0%;
  transition:width 1.3s cubic-bezier(.23,1,.32,1);
  position:relative;
}
.sbar-fill::after {
  content:''; position:absolute; right:0; top:0; bottom:0;
  width:2px; background:rgba(255,250,220,.75);
}
.sbar-val { font-size:12px; color:var(--gold-lt); width:20px; text-align:right; flex-shrink:0; }
.sbar-mod { font-size:9px; color:rgba(150,100,30,.75); width:20px; flex-shrink:0; }

/* Buttons */
.detail-btns { display:flex; gap:8px; }
.btn-back {
  padding:12px 16px;
  background:none; border:1px solid var(--gold-dk);
  color:rgba(160,100,30,.8);
  font-family:'Cinzel', serif; font-size:10px;
  letter-spacing:2px; text-transform:uppercase;
  cursor:pointer; transition:all .2s;
}
.btn-back:active { border-color:var(--gold); color:var(--gold); }
.btn-choose {
  flex:1; padding:12px;
  background:linear-gradient(180deg,rgba(140,90,15,.3),rgba(70,40,5,.3));
  border:1px solid var(--gold);
  color:var(--gold-lt);
  font-family:'Cinzel', serif; font-size:11px;
  letter-spacing:3px; text-transform:uppercase;
  cursor:pointer; transition:all .2s;
}
.btn-choose:active {
  background:linear-gradient(180deg,rgba(200,130,20,.4),rgba(110,65,10,.4));
  box-shadow:0 0 16px rgba(200,130,20,.3);
}
</style>

<canvas id="emberCanvas"></canvas>

<!-- ══ SELECT SCREEN ══ -->
<div id="selectScreen">
  <div class="select-bg"></div>
  <div class="select-vignette"></div>

  <div class="select-title">
    <h1>Logan's Last Raid</h1>
    <p>One Shot · October 2026</p>
    <div class="title-rule">
      <div class="title-rule-line"></div>
      <div class="title-rule-gem"></div>
      <div class="title-rule-line"></div>
    </div>
  </div>

  <!-- Campfire -->
  <div class="campfire-wrap">
    <div class="fire-glow-ground"></div>
    <svg class="flames-svg" width="48" height="76" viewBox="0 0 48 76" fill="none">
      <path class="f-out" d="M24 72C7 55 3 38 11 23c2 14 8 8 6-4 4 12 10 6 8-6 6 14 12 32 8 50z" fill="rgba(160,50,0,.55)"/>
      <path class="f-mid" d="M24 72c-13-17-14-32-8-45 2 9 6 5 5-3 3 9 7 5 6-3 4 11 10 28 7 44z" fill="rgba(235,110,0,.78)"/>
      <path class="f-in"  d="M24 72c-8-14-9-26-4-36 1 7 4 4 3-2 2 7 5 4 4-2 3 9 7 22 5 36z" fill="rgba(255,215,70,.95)"/>
      <ellipse cx="24" cy="71" rx="10" ry="4.5" fill="rgba(255,250,190,.72)"/>
    </svg>
    <div class="fire-coals"></div>
    <div class="fire-logs-img"></div>
  </div>

  <!-- Characters -->
  <div class="chars-arc" id="charsArc"></div>

  <div class="tap-hint" id="tapHint">Tap a champion</div>
</div>

<!-- ══ DETAIL PANEL ══ -->
<div id="detailPanel">
  <div class="detail-backdrop"></div>
  <div class="detail-hero">
    <div class="detail-hero-img" id="detailHeroImg"></div>
    <div class="detail-hero-overlay"></div>
  </div>
  <div class="detail-card">
    <div class="detail-name-wrap">
      <div class="detail-name" id="detailName" contenteditable="true" spellcheck="false"></div>
      <span class="edit-hint">tap to rename</span>

    <div class="detail-class" id="detailClass"></div>
    <div class="detail-tagline" id="detailTagline"></div>
    <div class="vitals-row" id="detailVitals"></div>
    <div class="stat-bars" id="detailBars"></div>
    <div class="detail-btns">
      <button class="btn-back" onclick="closeDetail()">← Back</button>
      <button class="btn-choose" onclick="proceedToMagicItem()">Choose Magic Item →</button>
    </div>
  </div>
</div>

<script id="imgScript"></script>

<script>

// IMAGE REGISTRY — filled after load

// ══════════════════════════════════════
// EMBER CANVAS
// ══════════════════════════════════════
const canvas = document.getElementById('emberCanvas');
const ctx = canvas.getContext('2d');
function resizeCanvas(){ canvas.width=innerWidth; canvas.height=innerHeight; }
resizeCanvas(); window.addEventListener('resize', resizeCanvas);

const embers = Array.from({length:55}, () => mkEmber(true));
function mkEmber(rand){
  const cx = innerWidth/2;
  return {
    x: cx + (Math.random()-.5)*60,
    y: rand ? innerHeight*(.45+Math.random()*.45) : innerHeight*.74,
    vx:(Math.random()-.5)*.75,
    vy:-(0.45+Math.random()*1.5),
    life:rand?Math.random():0,
    max:.45+Math.random()*.95,
    r:.6+Math.random()*1.9,
    c:Math.random()>.45?'#e05500':'#ffaa33'
  };
}
(function animE(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  embers.forEach(e=>{
    e.x += e.vx + Math.sin(e.life*8)*.45;
    e.y += e.vy;
    e.life += .007;
    if(e.life>e.max) Object.assign(e, mkEmber(false));
    const a = Math.sin(e.life/e.max*Math.PI)*.88;
    ctx.globalAlpha = a;
    ctx.fillStyle = e.c;
    ctx.beginPath();
    ctx.arc(e.x,e.y,e.r,0,Math.PI*2);
    ctx.fill();
  });
  ctx.globalAlpha=1;
  requestAnimationFrame(animE);
})();

// ══════════════════════════════════════
// BUILD SELECT SCREEN
// ══════════════════════════════════════
function buildSelectScreen(){
  const arc = document.getElementById('charsArc');
  arc.innerHTML = '';
  CHARS.forEach(c => {
    const slot = document.createElement('div');
    slot.className = 'char-slot';
    slot.dataset.id = c.id;
    slot.innerHTML = `
      <div class="char-portrait">
        <div class="portrait-idle" style="background-image:url('${IMGS[c.idleKey]}'); background-position:top center;"></div>
        <div class="portrait-fire-overlay"></div>
        <div class="portrait-edge"></div>
        <div class="portrait-bottom-fade"></div>
      </div>
      <div class="char-name-tag">${c.name.split(' ')[0]}</div>
    `;
    slot.addEventListener('click', () => selectChar(c.id));
    arc.appendChild(slot);
  });
}

// ══════════════════════════════════════
// SELECT / DESELECT
// ══════════════════════════════════════
function mod(v){ const m=Math.floor((v-10)/2); return(m>=0?'+':'')+m; }

function selectChar(id){
  activeId = id;
  const c = CHARS.find(x=>x.id===id);

  // Dim others
  document.querySelectorAll('.char-slot').forEach(el=>{
    el.classList.toggle('dimmed', el.dataset.id !== id);
  });
  document.getElementById('tapHint').style.opacity='0';

  // Fill detail panel
  document.getElementById('detailHeroImg').style.backgroundImage = `url('${IMGS[c.selectedKey]}')`;
  document.getElementById('detailHeroImg').style.backgroundPosition = `center ${c.selectedFocalY}`;

  const nameEl = document.getElementById('detailName');
  nameEl.textContent = c.name;

  document.getElementById('detailClass').textContent = c.cls;
  document.getElementById('detailTagline').textContent = c.tagline;

  document.getElementById('detailVitals').innerHTML = `
    <div class="vital"><div class="vital-val" style="color:#70c050">${c.hp}</div><div class="vital-lbl">HP</div></div>
    <div class="vital"><div class="vital-val" style="color:#4090e0">${c.ac}</div><div class="vital-lbl">AC</div></div>
    <div class="vital"><div class="vital-val" style="color:var(--gold)">${c.speed}</div><div class="vital-lbl">Spd</div></div>
    <div class="vital"><div class="vital-val" style="color:var(--gold-lt)">+${c.prof}</div><div class="vital-lbl">Prof</div></div>
  `;

  document.getElementById('detailBars').innerHTML = Object.entries(c.stats).map(([k,v])=>`
    <div class="sbar">
      <span class="sbar-lbl">${k}</span>
      <div class="sbar-track">
        <div class="sbar-fill" data-pct="${Math.round(v/20*100)}" style="width:0%"></div>
      </div>
      <span class="sbar-val">${v}</span>
      <span class="sbar-mod">${mod(v)}</span>
    </div>
  `).join('');

  // Open panel
  document.getElementById('detailPanel').classList.add('open');

  // Animate bars
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    document.querySelectorAll('.sbar-fill').forEach(b=>{
      b.style.width = b.dataset.pct + '%';
    });
  }));
}

function closeDetail(){
  activeId = null;
  document.getElementById('detailPanel').classList.remove('open');
  document.querySelectorAll('.char-slot').forEach(el=>el.classList.remove('dimmed'));
  document.getElementById('tapHint').style.opacity='';
}

function proceedToMagicItem(){
  const nameEl = document.getElementById('detailName');
  const currentName = nameEl.textContent.trim();
  // Store final name back to char data
  if(activeId){
    const c = CHARS.find(x=>x.id===activeId);
    if(c) c.name = currentName;
  }
  // TODO: wire to magic item picker + combat sheet
  alert(`${currentName} steps into the dungeon.\n\nMagic item selection coming next.`);
}

// ══════════════════════════════════════
// INIT — load images from inline script
// ══════════════════════════════════════
function init(){
  buildSelectScreen();
}
