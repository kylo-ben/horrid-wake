<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Logan's Last Raid</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@400;600;700&family=UnifrakturMaguntia&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #c8943a;
  --gold-lt: #f0c85a;
  --gold-dk: #3a2208;
  --blood: #7a1010;
  --ember: #d94f00;
  --coal: #080402;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;background:#000;}
body{font-family:'Cinzel',serif;color:var(--gold);touch-action:manipulation;}

/* grain */
body::after{content:'';position:fixed;inset:0;z-index:999;pointer-events:none;opacity:.05;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");}

/* ═══ SCREENS ═══ */
.screen{position:fixed;inset:0;transition:opacity .5s ease;}
.screen.out{opacity:0;pointer-events:none;}

/* ═══ SELECT SCREEN ═══ */
#selectScreen{z-index:10;background:var(--coal);}

.s-bg{
  position:absolute;inset:0;
  background:
    radial-gradient(ellipse 90% 50% at 50% 80%, rgba(180,60,0,.22) 0%,transparent 65%),
    radial-gradient(ellipse 120% 70% at 50% 100%, rgba(50,10,0,.55) 0%,transparent 60%),
    linear-gradient(180deg,#030100 0%,#060301 50%,#0a0402 100%);
}
.s-vignette{
  position:absolute;inset:0;pointer-events:none;
  background:radial-gradient(ellipse 100% 100% at 50% 50%,transparent 30%,rgba(0,0,0,.88) 100%);
}

/* TITLE */
.s-title{
  position:absolute;top:0;left:0;right:0;z-index:5;
  text-align:center;padding:20px 16px 0;pointer-events:none;
}
.s-title h1{
  font-family:'UnifrakturMaguntia',cursive;
  font-size:clamp(28px,8vw,50px);
  color:var(--gold-lt);
  text-shadow:0 0 40px rgba(210,130,10,.75),0 0 80px rgba(160,60,0,.4),2px 3px 0 rgba(0,0,0,.95);
  line-height:1;
}
.s-title p{
  font-family:'IM Fell English',serif;font-style:italic;
  color:rgba(160,95,20,.65);font-size:11px;letter-spacing:4px;margin-top:5px;
}
.s-rule{display:flex;align-items:center;gap:8px;max-width:240px;margin:7px auto 0;}
.s-rule-line{flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--gold-dk),transparent);}
.s-rule-gem{width:5px;height:5px;background:var(--gold);transform:rotate(45deg);flex-shrink:0;}

/* FIRE */
.fire-wrap{
  position:absolute;bottom:13%;left:50%;transform:translateX(-50%);
  z-index:6;width:60px;display:flex;flex-direction:column;align-items:center;
}
.fire-glow{
  position:absolute;bottom:-18px;left:50%;transform:translateX(-50%);
  width:180px;height:90px;
  background:radial-gradient(ellipse at 50% 100%,rgba(255,90,0,.38),rgba(160,40,0,.18) 50%,transparent 75%);
  filter:blur(14px);
  animation:gp .28s ease-in-out infinite alternate;
}
@keyframes gp{from{opacity:.55;transform:translateX(-50%) scaleX(.86)}to{opacity:1;transform:translateX(-50%) scaleX(1.14)}}
.fire-logs{position:relative;width:56px;height:12px;z-index:2;}
.fire-logs::before,.fire-logs::after{
  content:'';position:absolute;width:46px;height:6px;
  background:linear-gradient(90deg,#100500,#281002,#100500);
  border-radius:3px;box-shadow:0 1px 8px rgba(255,70,0,.5);top:3px;left:5px;
}
.fire-logs::after{transform:rotate(54deg);transform-origin:center;}
.fire-coals{
  position:absolute;bottom:3px;left:50%;transform:translateX(-50%);
  width:38px;height:6px;
  background:radial-gradient(ellipse,rgba(255,110,0,.9),rgba(170,35,0,.5),transparent);
  border-radius:50%;animation:coal .32s ease-in-out infinite alternate;
}
@keyframes coal{from{opacity:.6}to{opacity:1}}
.flames{position:absolute;bottom:11px;left:50%;transform:translateX(-50%);overflow:visible;}
.fo{animation:fo .21s ease-in-out infinite alternate;transform-origin:50% 100%;}
.fm{animation:fm .17s ease-in-out infinite alternate;transform-origin:50% 100%;}
.fi{animation:fi .13s ease-in-out infinite alternate;transform-origin:50% 100%;}
@keyframes fo{0%{transform:scaleX(.86) scaleY(.91) rotate(-2deg)}100%{transform:scaleX(1.11) scaleY(1.07) rotate(2deg)}}
@keyframes fm{0%{transform:scaleX(1.05) scaleY(.95) rotate(3deg)}100%{transform:scaleX(.9) scaleY(1.06) rotate(-2deg)}}
@keyframes fi{0%{transform:scaleX(.91) scaleY(1.06)}100%{transform:scaleX(1.08) scaleY(.93)}}

/* CHARACTER CARDS */
.chars-row{
  position:absolute;bottom:0;left:0;right:0;height:80%;
  z-index:7;display:flex;align-items:flex-end;justify-content:center;
  gap:3px;padding:0 6px;
}

.char-card{
  flex:1;max-width:26vw;height:100%;
  position:relative;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;justify-content:flex-end;
  padding-bottom:3%;
  transform-origin:bottom center;
  transition:transform .4s cubic-bezier(.23,1,.32,1), filter .4s ease, opacity .35s ease;
  -webkit-user-select:none;user-select:none;
  overflow:hidden;
}

/* the image itself */
.card-img{
  position:absolute;inset:0;
  background-size:cover;
  background-repeat:no-repeat;
  background-position:center top;
  filter:saturate(.65) brightness(.75);
  transition:filter .4s ease, transform .5s cubic-bezier(.23,1,.32,1);
}

/* warm firelight bleeding up from bottom */
.card-fire-light{
  position:absolute;inset:0;pointer-events:none;
  background:
    linear-gradient(0deg,
      rgba(160,55,0,.65) 0%,
      rgba(100,30,0,.35) 18%,
      rgba(50,10,0,.1) 35%,
      transparent 55%);
  transition:opacity .3s;
}

/* side fade — blends into darkness */
.card-sides{
  position:absolute;inset:0;pointer-events:none;
  box-shadow:inset 12px 0 22px rgba(0,0,0,.85), inset -12px 0 22px rgba(0,0,0,.85);
}

/* top fade */
.card-top-fade{
  position:absolute;top:0;left:0;right:0;height:30%;pointer-events:none;
  background:linear-gradient(180deg,rgba(3,1,0,.8) 0%,transparent 100%);
}

/* bottom fade into ground */
.card-bottom-fade{
  position:absolute;bottom:0;left:0;right:0;height:35%;pointer-events:none;
  background:linear-gradient(0deg,rgba(4,1,0,1) 0%,rgba(4,1,0,.75) 35%,transparent 100%);
}

/* active / tap state */
.char-card:active .card-img{
  filter:saturate(1.05) brightness(.95);
  transform:scale(1.03);
}
.char-card:active .card-fire-light{
  background:linear-gradient(0deg,
    rgba(220,90,0,.75) 0%,
    rgba(140,45,0,.4) 20%,
    transparent 50%);
}

/* dimmed when another is selected */
.char-card.dimmed{
  opacity:.12;
  filter:grayscale(.9) brightness(.3);
  pointer-events:none;
}

/* name */
.card-label{
  position:relative;z-index:2;
  font-size:clamp(7px,1.8vw,11px);
  letter-spacing:2px;color:rgba(190,115,25,.8);
  text-transform:uppercase;text-align:center;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  max-width:96%;padding:0 3px;
  transition:color .2s;
  text-shadow:0 1px 4px rgba(0,0,0,.9);
}
.char-card:active .card-label{color:var(--gold-lt);}

/* tap hint */
.tap-hint{
  position:absolute;bottom:1.5%;left:0;right:0;text-align:center;z-index:8;
  font-family:'IM Fell English',serif;font-style:italic;
  color:rgba(160,95,20,.5);font-size:11px;letter-spacing:3px;
  animation:hpulse 3s ease-in-out infinite;pointer-events:none;transition:opacity .4s;
}
@keyframes hpulse{0%,100%{opacity:.25}50%{opacity:.8}}

canvas{position:fixed;inset:0;z-index:2;pointer-events:none;}

/* ═══════════════════════════════════
   DETAIL PANEL
═══════════════════════════════════ */
#detailPanel{
  position:fixed;inset:0;z-index:50;
  opacity:0;pointer-events:none;
  transition:opacity .35s ease;
  display:flex;flex-direction:column;
}
#detailPanel.open{opacity:1;pointer-events:all;}

.d-backdrop{
  position:absolute;inset:0;
  background:rgba(0,0,0,.8);
  backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);
}

/* Hero image — full bleed top portion */
.d-hero{
  position:absolute;top:0;left:0;right:0;height:56%;
  overflow:hidden;
}
.d-hero-img{
  position:absolute;inset:0;
  background-size:cover;
  background-position:center 15%;
  background-repeat:no-repeat;
  transform:scale(1.06);
  transition:transform .55s cubic-bezier(.23,1,.32,1);
  filter:brightness(.88) contrast(1.08) saturate(1.05);
}
#detailPanel.open .d-hero-img{transform:scale(1);}
.d-hero-overlay{
  position:absolute;inset:0;
  background:
    linear-gradient(0deg,rgba(3,1,0,1) 0%,rgba(3,1,0,.65) 12%,rgba(8,3,0,.15) 40%,transparent 65%),
    linear-gradient(180deg,rgba(0,0,0,.5) 0%,transparent 22%),
    radial-gradient(ellipse 70% 50% at 50% 85%,rgba(180,60,0,.18),transparent 70%);
}

/* Stats card */
.d-card{
  position:absolute;bottom:0;left:0;right:0;
  background:linear-gradient(0deg,rgba(3,1,0,.99) 55%,rgba(3,1,0,.88) 100%);
  border-top:1px solid rgba(80,40,5,.7);
  padding:14px 18px 24px;
  transform:translateY(100%);
  transition:transform .45s cubic-bezier(.23,1,.32,1) .08s;
}
#detailPanel.open .d-card{transform:translateY(0);}
.d-card::before{content:'';position:absolute;top:-1px;left:0;width:14px;height:14px;border-top:1px solid var(--gold);border-left:1px solid var(--gold);}
.d-card::after{content:'';position:absolute;top:-1px;right:0;width:14px;height:14px;border-top:1px solid var(--gold);border-right:1px solid var(--gold);}

/* name editable */
.d-name-row{display:flex;align-items:baseline;gap:8px;margin-bottom:1px;}
.d-name{
  font-family:'UnifrakturMaguntia',cursive;
  font-size:clamp(22px,6.5vw,34px);
  color:var(--gold-lt);
  text-shadow:0 0 18px rgba(200,130,10,.5);
  outline:none;border:none;background:none;
  cursor:text;min-width:10px;
  caret-color:var(--gold-lt);
  transition:border-color .2s;
  border-bottom:1px solid transparent;
}
.d-name:focus{border-bottom-color:rgba(100,55,5,.6);}
.d-name-hint{font-family:'IM Fell English',serif;font-style:italic;font-size:10px;color:rgba(140,80,15,.45);white-space:nowrap;}
.d-cls{font-size:9px;letter-spacing:3px;color:rgba(155,90,18,.75);text-transform:uppercase;margin-bottom:2px;}
.d-tag{font-family:'IM Fell English',serif;font-style:italic;color:rgba(130,70,12,.85);font-size:12px;margin-bottom:10px;line-height:1.4;}

/* vitals */
.d-vitals{display:flex;gap:0;margin-bottom:10px;border:1px solid rgba(60,30,5,.7);}
.d-vital{flex:1;text-align:center;padding:6px 2px;border-right:1px solid rgba(60,30,5,.7);}
.d-vital:last-child{border-right:none;}
.d-vital-v{font-family:'Cinzel Decorative',serif;font-size:17px;line-height:1;margin-bottom:1px;}
.d-vital-l{font-size:7px;letter-spacing:2px;color:rgba(145,82,15,.7);text-transform:uppercase;}

/* stat bars */
.d-bars{display:flex;flex-direction:column;gap:5px;margin-bottom:12px;}
.d-bar{display:flex;align-items:center;gap:6px;}
.d-bar-lbl{font-size:9px;letter-spacing:1px;color:rgba(155,88,15,.8);width:26px;flex-shrink:0;text-transform:uppercase;}
.d-bar-track{flex:1;height:7px;background:rgba(255,255,255,.04);border:1px solid rgba(180,130,40,.09);overflow:hidden;}
.d-bar-fill{
  height:100%;width:0%;
  background:linear-gradient(90deg,rgba(90,38,4,.9),var(--gold),var(--gold-lt));
  box-shadow:0 0 5px rgba(190,120,15,.4);
  transition:width 1.25s cubic-bezier(.23,1,.32,1);
  position:relative;
}
.d-bar-fill::after{content:'';position:absolute;right:0;top:0;bottom:0;width:2px;background:rgba(255,245,200,.7);}
.d-bar-val{font-size:12px;color:var(--gold-lt);width:20px;text-align:right;flex-shrink:0;}
.d-bar-mod{font-size:9px;color:rgba(145,88,15,.75);width:20px;flex-shrink:0;}

/* buttons */
.d-btns{display:flex;gap:8px;}
.d-btn-back{
  padding:11px 14px;background:none;
  border:1px solid rgba(60,30,5,.8);
  color:rgba(155,88,15,.8);font-family:'Cinzel',serif;
  font-size:10px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all .2s;
}
.d-btn-back:active{border-color:var(--gold);color:var(--gold);}
.d-btn-enter{
  flex:1;padding:11px;
  background:linear-gradient(180deg,rgba(120,72,10,.28),rgba(60,32,4,.28));
  border:1px solid var(--gold);
  color:var(--gold-lt);font-family:'Cinzel',serif;
  font-size:11px;letter-spacing:3px;text-transform:uppercase;cursor:pointer;transition:all .2s;
}
.d-btn-enter:active{background:linear-gradient(180deg,rgba(185,115,15,.38),rgba(95,50,8,.38));box-shadow:0 0 14px rgba(185,115,15,.28);}
</style>
</head>
<body>
<canvas id="ec"></canvas>

<!-- SELECT -->
<div class="screen" id="selectScreen">
  <div class="s-bg"></div>
  <div class="s-vignette"></div>

  <div class="s-title">
    <h1>Logan's Last Raid</h1>
    <p>One Shot · October 2026</p>
    <div class="s-rule"><div class="s-rule-line"></div><div class="s-rule-gem"></div><div class="s-rule-line"></div></div>
  </div>

  <div class="fire-wrap">
    <div class="fire-glow"></div>
    <svg class="flames" width="46" height="72" viewBox="0 0 46 72" fill="none">
      <path class="fo" d="M23 68C7 52 3 35 11 21c2 13 8 7 6-4 4 11 10 5 8-6 6 13 12 31 8 49z" fill="rgba(150,45,0,.52)"/>
      <path class="fm" d="M23 68c-12-16-13-31-7-44 2 8 6 4 5-2 3 8 7 4 6-3 4 10 10 27 7 43z" fill="rgba(228,102,0,.76)"/>
      <path class="fi" d="M23 68c-7-14-8-25-4-34 1 6 4 3 3-2 2 6 5 3 4-2 3 8 7 21 5 35z" fill="rgba(255,210,65,.94)"/>
      <ellipse cx="23" cy="67" rx="9" ry="4" fill="rgba(255,248,185,.7)"/>
    </svg>
    <div class="fire-coals"></div>
    <div class="fire-logs"></div>
  </div>

  <div class="chars-row" id="charsRow"></div>
  <div class="tap-hint" id="tapHint">Tap a champion to answer the call</div>
</div>

<!-- DETAIL -->
<div id="detailPanel">
  <div class="d-backdrop"></div>
  <div class="d-hero">
    <div class="d-hero-img" id="dHeroImg"></div>
    <div class="d-hero-overlay"></div>
  </div>
  <div class="d-card">
    <div class="d-name-row">
      <div class="d-name" id="dName" contenteditable="true" spellcheck="false"></div>
      <span class="d-name-hint">tap to rename</span>
    </div>
    <div class="d-cls" id="dCls"></div>
    <div class="d-tag" id="dTag"></div>
    <div class="d-vitals" id="dVitals"></div>
    <div class="d-bars" id="dBars"></div>
    <div class="d-btns">
      <button class="d-btn-back" onclick="closeDetail()">← Back</button>
      <button class="d-btn-enter" onclick="enterDungeon()">Enter the Dungeon →</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════
// CHARACTER DATA
// ═══════════════════════════════════════
const CHARS = [
  {
    id: 'union_boss',
    name: 'The Union Boss',
    cls: 'Fighter · Battle Master',
    tag: '"I\'ve made a huge mistake... by letting you live this long."',
    lore: 'Tommy Shelby\'s coldness. Daredevil\'s radar. Ron Swanson\'s authority. Gob\'s catastrophic overconfidence. One blindfolded man with a warhammer and zero mercy.',
    hp: 52, ac: 17, speed: 30, prof: 3,
    stats: { STR:16, DEX:12, CON:14, INT:8, WIS:14, CHA:10 },
    imgKey: 'union_boss',
    accentColor: '#c87820',
  },
  {
    id: 'stitch',
    name: '"Stitch" Gamgee-Strider',
    cls: 'Monk · Way of Mercy',
    tag: '"I didn\'t come here to be a hero. I came to make sure there\'s someone left to bury the heroes."',
    lore: 'Hawkeye\'s clinical precision. Sam\'s refusal to quit. Aragorn\'s ranger instinct. John Grady Cole\'s horse-sweat stoicism. She heals you and then hits the next guy.',
    hp: 44, ac: 16, speed: 45, prof: 3,
    stats: { STR:10, DEX:16, CON:14, INT:10, WIS:16, CHA:8 },
    imgKey: 'stitch',
    accentColor: '#608840',
  },
  {
    id: 'ember',
    name: 'Commander Elara "Ember-Born" Vane',
    cls: 'Fighter · Echo Knight',
    tag: '"My heart is already burnt to ash. That is why it can never stop burning."',
    lore: 'Last of a dead lineage. Her Blood-Wraith Echo strikes from 30 feet while she commands from the rear. Six attacks in six seconds when she stops holding back.',
    hp: 49, ac: 18, speed: 30, prof: 3,
    stats: { STR:18, DEX:10, CON:16, INT:10, WIS:12, CHA:10 },
    imgKey: 'ember',
    accentColor: '#b03020',
  },
  {
    id: 'hound',
    name: 'Vespera "The Hound" Thorne',
    cls: 'Fighter · Battle Master',
    tag: '"She doesn\'t fight for glory or gold. She fights because she is the only one left."',
    lore: 'Aragorn\'s stoicism. Levi\'s spinning precision. Tommy Shelby\'s calculation. Wolverine\'s refusal to die. Two blackened blades and a code nobody else remembers.',
    hp: 49, ac: 15, speed: 30, prof: 3,
    stats: { STR:10, DEX:16, CON:16, INT:12, WIS:13, CHA:8 },
    imgKey: 'hound',
    accentColor: '#5080a0',
  },
];

let IMGS = {};
let activeId = null;

// ═══════════════════════════════════════
// EMBER CANVAS
// ═══════════════════════════════════════
const canvas = document.getElementById('ec');
const ctx = canvas.getContext('2d');
function rsz(){ canvas.width=innerWidth; canvas.height=innerHeight; }
rsz(); window.addEventListener('resize', rsz);

const embers = Array.from({length:55}, ()=>mkE(true));
function mkE(r){
  const cx=innerWidth/2;
  return{x:cx+(Math.random()-.5)*70,y:r?innerHeight*(.42+Math.random()*.48):innerHeight*.75,
    vx:(Math.random()-.5)*.8,vy:-(0.4+Math.random()*1.6),
    life:r?Math.random():0,max:.4+Math.random()*.9,r:.6+Math.random()*2,
    c:Math.random()>.42?'#d94f00':'#ffaa33'};
}
(function anim(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  embers.forEach(e=>{
    e.x+=e.vx+Math.sin(e.life*9)*.45; e.y+=e.vy; e.life+=.007;
    if(e.life>e.max) Object.assign(e,mkE(false));
    const a=Math.sin(e.life/e.max*Math.PI)*.85;
    ctx.globalAlpha=a; ctx.fillStyle=e.c;
    ctx.beginPath(); ctx.arc(e.x,e.y,e.r,0,Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha=1;
  requestAnimationFrame(anim);
})();

// ═══════════════════════════════════════
// BUILD CARDS
// ═══════════════════════════════════════
function buildCards(){
  const row = document.getElementById('charsRow');
  row.innerHTML = '';
  CHARS.forEach(c => {
    const card = document.createElement('div');
    card.className = 'char-card';
    card.dataset.id = c.id;
    card.innerHTML = `
      <div class="card-img" style="background-image:url('${IMGS[c.imgKey] || ''}')"></div>
      <div class="card-fire-light"></div>
      <div class="card-top-fade"></div>
      <div class="card-sides"></div>
      <div class="card-bottom-fade"></div>
      <div class="card-label">${c.name.split(' ').slice(-1)[0].replace(/['"]/g,'')}</div>
    `;
    card.addEventListener('click', ()=>openDetail(c.id));
    row.appendChild(card);
  });
}

// ═══════════════════════════════════════
// OPEN / CLOSE DETAIL
// ═══════════════════════════════════════
function mmod(v){ const m=Math.floor((v-10)/2); return(m>=0?'+':'')+m; }

function openDetail(id){
  activeId = id;
  const c = CHARS.find(x=>x.id===id);

  // Dim others
  document.querySelectorAll('.char-card').forEach(el=>{
    el.classList.toggle('dimmed', el.dataset.id!==id);
  });
  document.getElementById('tapHint').style.opacity='0';

  // Hero image — pan to show character face/upper body
  const heroImg = document.getElementById('dHeroImg');
  heroImg.style.backgroundImage = `url('${IMGS[c.imgKey] || ''}')`;
  heroImg.style.backgroundPosition = 'center 20%';

  // Fill content
  document.getElementById('dName').textContent = c.name;
  document.getElementById('dCls').textContent = c.cls;
  document.getElementById('dTag').textContent = c.tag;

  document.getElementById('dVitals').innerHTML = `
    <div class="d-vital"><div class="d-vital-v" style="color:#65c040">${c.hp}</div><div class="d-vital-l">HP</div></div>
    <div class="d-vital"><div class="d-vital-v" style="color:#3d8fd4">${c.ac}</div><div class="d-vital-l">AC</div></div>
    <div class="d-vital"><div class="d-vital-v" style="color:var(--gold)">${c.speed}</div><div class="d-vital-l">Speed</div></div>
    <div class="d-vital"><div class="d-vital-v" style="color:var(--gold-lt)">+${c.prof}</div><div class="d-vital-l">Prof</div></div>
  `;

  document.getElementById('dBars').innerHTML = Object.entries(c.stats).map(([k,v])=>`
    <div class="d-bar">
      <span class="d-bar-lbl">${k}</span>
      <div class="d-bar-track"><div class="d-bar-fill" data-pct="${Math.round(v/20*100)}" style="width:0%"></div></div>
      <span class="d-bar-val">${v}</span>
      <span class="d-bar-mod">${mmod(v)}</span>
    </div>
  `).join('');

  document.getElementById('detailPanel').classList.add('open');

  // Animate bars
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    document.querySelectorAll('.d-bar-fill').forEach(b=>{ b.style.width = b.dataset.pct+'%'; });
  }));
}

function closeDetail(){
  activeId = null;
  document.getElementById('detailPanel').classList.remove('open');
  document.querySelectorAll('.char-card').forEach(el=>el.classList.remove('dimmed'));
  document.getElementById('tapHint').style.opacity='';
}

function enterDungeon(){
  const nameEl = document.getElementById('dName');
  const c = CHARS.find(x=>x.id===activeId);
  if(c) c.name = nameEl.textContent.trim();
  // TODO: wire to magic item picker + combat sheet
  alert(`${c.name} steps into the dungeon.\n\nCombat sheet coming next.`);
}

// ═══════════════════════════════════════
// INIT
// ═══════════════════════════════════════
function init(){
  buildCards();
}
</script>
